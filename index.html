<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Таро PRO AI</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  background: radial-gradient(circle at center, #14002b, #000);
}

h1 { margin-top:20px; font-size:38px; text-shadow:0 0 15px violet; }

.spread { display:flex; justify-content:center; gap:25px; margin-top:60px; }

.card {
  width:120px; height:200px;
  background:linear-gradient(135deg,#6a00ff,#2a004d);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  transition:0.4s;
  font-size:22px;
}

.card:hover { transform:scale(1.1); box-shadow:0 0 20px violet; }

.result { margin-top:30px; max-width:600px; margin-left:auto; margin-right:auto; line-height:1.6; }

button {
  margin-top:20px; padding:10px 20px;
  background:gold; border:none; border-radius:10px; cursor:pointer;
}

input {
  margin-top:20px;
  padding:10px;
  width:250px;
  border-radius:10px;
  border:none;
}
</style>
</head>
<body>

<h1>🔮 Таро PRO AI</h1>
<p>Задай вопрос и получи ответ как от настоящего таролога</p>

<input id="question" placeholder="Например: что меня ждёт в любви?">

<div class="spread" id="spread"></div>
<div class="result" id="result"></div>
<button onclick="newSpread()">🔄 Новый расклад</button>

<script>

const cards = [
"Шут","Маг","Жрица","Императрица","Император","Иерофант","Влюбленные","Колесница","Сила","Отшельник",
"Колесо Фортуны","Справедливость","Повешенный","Смерть","Умеренность","Дьявол","Башня","Звезда","Луна","Солнце",
"Суд","Мир"
];

const positions = ["Прошлое","Настоящее","Будущее"];

function interpret(card, question){

  const themes = {
    "люб": "в отношениях и чувствах",
    "день": "в финансах и работе",
    "работ": "в карьере",
    "жизн": "в жизни"
  };

  let topic = "в жизни";

  for (let key in themes) {
    if (question.toLowerCase().includes(key)) {
      topic = themes[key];
    }
  }

  const meanings = [
    `Карта ${card} говорит, что сейчас происходит важный поворот ${topic}.`,
    `${card} указывает на скрытые процессы ${topic}, которые скоро проявятся.`,
    `${card} советует довериться себе ${topic} и не бояться перемен.`,
    `Энергия карты ${card} показывает, что ${topic} зависит от твоего выбора.`,
    `${card} предупреждает: будь внимателен ${topic}, есть важный урок.`
  ];

  return meanings[Math.floor(Math.random()*meanings.length)];
}

function newSpread(){
  const spread = document.getElementById("spread");
  const result = document.getElementById("result");
  const question = document.getElementById("question").value || "твоей жизни";

  spread.innerHTML="";
  result.innerHTML="";

  for(let i=0;i<3;i++){
    const cardName = cards[Math.floor(Math.random()*cards.length)];

    const div=document.createElement("div");
    div.className="card";
    div.innerText="✨";

    div.onclick=()=>{
      div.innerText=cardName;
      result.innerHTML+=`<p><b>${positions[i]}:</b> ${interpret(cardName, question)}</p>`;
    };

    spread.appendChild(div);
  }
}

newSpread();
</script>

</body>
</html>
