<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таро Онлайн</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0014;
  color: white;
  text-align: center;
}

.spread {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 50px;
}

.card {
  width: 120px;
  height: 200px;
  background: purple;
  cursor: pointer;
  border-radius: 10px;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<h1>🔮 Таро Онлайн</h1>

<div class="spread">
  <div class="card" onclick="draw()"></div>
  <div class="card" onclick="draw()"></div>
  <div class="card" onclick="draw()"></div>
</div>

<div id="result"></div>

<button onclick="draw()">Вытащить карту</button>

<script>
const cards = [
  "✨ Удача близко",
  "💔 Осторожно в любви",
  "💰 Деньги идут",
  "🌟 Новый шанс",
  "⚠️ Подожди",
  "❤️ Любовь рядом"
];

function draw() {
  const random = Math.floor(Math.random() * cards.length);
  document.getElementById("result").innerText = cards[random];
}
</script>

</body>
</html>
