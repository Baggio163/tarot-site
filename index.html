<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Tarot AI Pro</title>

<style>
body {margin:0;font-family:Arial;background:radial-gradient(circle,#1a0033,#000);color:white;text-align:center;}
.spread {display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin-top:30px;}
.card {width:110px;height:180px;border-radius:12px;background:#2a004d;background-size:cover;background-position:center;cursor:pointer;transition:0.4s;}
.card:hover {transform:scale(1.1);box-shadow:0 0 20px violet;}
.result {max-width:700px;margin:30px auto;text-align:left;}
button {padding:12px 25px;background:gold;border:none;border-radius:10px;cursor:pointer;}
.chat {
  position:fixed;
  bottom:10px;
  right:10px;
  width:300px;
  background:#111;
  border-radius:12px;
  padding:10px;
  box-shadow:0 0 20px violet;
}
.chat-messages {
  height:200px;
  overflow:auto;
  font-size:14px;
  text-align:left;
  margin-bottom:5px;
}
.chat input {width:70%; padding:5px;}
.chat button {padding:5px;}
</style>
</head>
<body>

<h1>🔮 Tarot AI Pro</h1>

<input id="question" placeholder="Твой вопрос...">
<select id="spreadType">
  <option value="3">3 карты</option>
  <option value="5">5 карт</option>
  <option value="7" selected>7 карт</option>
</select>
<br><br>
<button onclick="startReading()">🔮 Сделать расклад</button>

<div class="spread" id="spread"></div>
<div class="result" id="result"></div>

<!-- 🤖 ЧИТ ЧАТ -->
<div class="chat">
  <div class="chat-messages" id="chatMessages"></div>
  <input id="chatInput" placeholder="Спроси таролога...">
  <button onclick="sendMessage()">➤</button>
</div>

<script>

const cards = [
"fool","magician","high_priestess","empress","emperor","hierophant","lovers","chariot","strength","hermit","wheel_of_fortune","justice","hanged_man","death","temperance","devil","tower","star","moon","sun","judgement","world"
];

function playSound(){
  const audio = new Audio("https://www.soundjay.com/magic/magic-chime-01.mp3");
  audio.play();
}

function getImage(card){
  return `https://raw.githubusercontent.com/ekelen/tarot-api/master/static/cards/${card}.jpg`;
}

function generateText(card, question){
  return `🔮 Карта ${card}: Вопрос "${question}" связан с переменами. Доверься интуиции.`;
}

function startReading(){
  playSound();

  const spread = document.getElementById("spread");
  const result = document.getElementById("result");
  const count = +document.getElementById("spreadType").value;
  const question = document.getElementById("question").value;

  spread.innerHTML="";
  result.innerHTML="";

  for(let i=0;i<count;i++){
    const cardName = cards[Math.floor(Math.random()*cards.length)];

    const card = document.createElement("div");
    card.className="card";

    card.onclick=()=>{
      card.style.backgroundImage=`url(${getImage(cardName)})`;
      result.innerHTML += `<p>${generateText(cardName, question)}</p>`;
    };

    spread.appendChild(card);
  }
}

// 🤖 ФЕЙК AI (локальный)
function sendMessage(){
  const input = document.getElementById("chatInput");
  const messages = document.getElementById("chatMessages");

  const userText = input.value;
  if(!userText) return;

  messages.innerHTML += `<div>🧑: ${userText}</div>`;

  const responses = [
    "Я чувствую сильную энергию вокруг этого вопроса...",
    "Карты говорят, что ситуация скоро изменится.",
    "Тебе важно довериться интуиции.",
    "Ответ уже внутри тебя.",
    "Это не случайно, что ты спросил это сейчас."
  ];

  const botText = responses[Math.floor(Math.random()*responses.length)];

  setTimeout(()=>{
    messages.innerHTML += `<div>🔮 Чит: ${botText}</div>`;
    messages.scrollTop = messages.scrollHeight;
  },500);

  input.value="";
}

</script>

</body>
</html>
