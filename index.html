<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Таро Онлайн</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1a0033, #000);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 30px;
  font-size: 36px;
}

.spread {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 60px;
  perspective: 1000px;
}

.card {
  width: 140px;
  height: 230px;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateY(180deg);
  transition: transform 0.8s;
  cursor: pointer;
}

.card.revealed {
  transform: rotateY(0deg);
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  backface-visibility: hidden;
}

.front {
  background-size: cover;
  background-position: center;
}

.back {
  background: linear-gradient(135deg, #6a00ff, #2a004d);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  transform: rotateY(180deg);
}

.card:hover {
  transform: scale(1.05) rotateY(180deg);
}

.result {
  margin-top: 40px;
  font-size: 18px;
  line-height: 1.6;
}

button {
  margin-top: 30px;
  padding: 12px 24px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, gold, orange);
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,215,0,0.5);
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>
<body>

<h1>🔮 Таро Онлайн</h1>
<p>Нажми на карты и узнай своё будущее</p>

<div class="spread" id="spread"></div>

<div class="result" id="result"></div>

<button onclick="newSpread()">🔄 Новый расклад</button>

<script>
const cards = [
  {name:"Шут", img:"https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_00_Fool.jpg", text:"Новое начало и свобода"},
  {name:"Маг", img:"https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg", text:"Сила в твоих руках"},
  {name:"Жрица", img:"https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg", text:"Интуиция и тайны"},
  {name:"Солнце", img:"https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg", text:"Успех и радость"},
  {name:"Луна", img:"https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg", text:"Иллюзии и страхи"}
];

const positions = ["Прошлое", "Настоящее", "Будущее"];

function newSpread() {
  const spread = document.getElementById("spread");
  const result = document.getElementById("result");
  spread.innerHTML = "";
  result.innerHTML = "";

  for (let i = 0; i < 3; i++) {
    const data = cards[Math.floor(Math.random() * cards.length)];

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="face front" style="background-image:url('${data.img}')"></div>
      <div class="face back">🂠</div>
    `;

    card.onclick = () => reveal(card, data, i);

    spread.appendChild(card);
  }
}

function reveal(card, data, index) {
  if (card.classList.contains("revealed")) return;

  card.classList.add("revealed");

  document.getElementById("result").innerHTML +=
    `<p><b>${positions[index]}:</b> ${data.name} — ${data.text}</p>`;
}

newSpread();
</script>

</body>
</html>
